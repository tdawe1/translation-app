name: CI

on:
  push:
    branches: [main, devbranch-1]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gengo
          POSTGRES_PASSWORD: devpass
          POSTGRES_DB: gengowatcher_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: backend
      - name: Download dependencies
        run: go mod download
        working-directory: backend
      - name: Test
        run: go test -p 1 -race -coverprofile=coverage.out ./...
        working-directory: backend
        env:
          TEST_ENV: "true"
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5433
          TEST_DB_USER: gengo
          TEST_DB_PASSWORD: devpass
          TEST_DB_NAME: gengowatcher_test
          TEST_DB_SSLMODE: disable
          TEST_DATABASE_URL: host=localhost port=5433 user=gengo password=devpass dbname=gengowatcher_test sslmode=disable
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: gengo
          DB_PASSWORD: devpass
          DB_NAME: gengowatcher_test
          DB_SSLMODE: disable
          JWT_SECRET: test-secret-for-testing-only-32-chars-min

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm run test -- --run
        working-directory: frontend

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript, go
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

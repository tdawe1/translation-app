# A generic, single database configuration.
[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %(rev)s_%%(slug)s

# sysbins path, if using a system path
# sysbins_path = /usr/local/bin

# timezone used for the migration datetimes
# timezone = UTC

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# version number format
version_num_format = %04d

# version path separator; As mentioned above, this is the character used to split
# version_locations. The default here is one of the best practices
# version_path_separator = :
# version_path_separator = os

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source extension. as of alembic 2.0, this defaults to true
# render_pyencoding = none

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic
handlers = console
formatter = generic

[logger_root]
level = WARN
qualifiers =

[logger_sqlalchemy]
level = WARN
qualifiers =

[logger_alembic]
level = INFO
qualifiers =

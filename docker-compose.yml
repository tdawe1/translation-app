version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: gengowatcher-postgres
    environment:
      POSTGRES_DB: gengowatcher
      POSTGRES_USER: gengo
      POSTGRES_PASSWORD: devpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gengo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: gengowatcher-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: gengowatcher-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

  # Go backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gengowatcher-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://gengo:devpass@postgres:5432/gengowatcher
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=dev-secret-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:17-alpine
    container_name: gengowatcher-postgres
    network_mode: host
    environment:
      POSTGRES_DB: gengowatcher
      POSTGRES_USER: gengo
      POSTGRES_PASSWORD: devpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gengo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: gengowatcher-redis
    network_mode: host
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-devpass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    network_mode: host

volumes:
  postgres_data:
  redis_data:

services:
  postgres:
    image: postgres:17-alpine
    container_name: gengowatcher-postgres
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: gengowatcher
      POSTGRES_USER: gengo
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gengo"]
      interval: 5s
      timeout: 5s
      retries: 5
    # P0-3 FIX: Add resource limits to prevent host DoS
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7.4-alpine
    container_name: gengowatcher-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # P0-3 FIX: Add resource limits to prevent host DoS
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "127.0.0.1:${MAILHOG_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILHOG_UI_PORT:-8025}:8025"
    # P0-3 FIX: Add resource limits to prevent host DoS
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  translation-worker:
    profiles:
      - full
      - worker
    build:
      context: ./backend/cmd/translation-worker
      dockerfile: Dockerfile
    container_name: gengowatcher-translation-worker
    network_mode: host
    environment:
      REDIS_URL: redis://redis:6379/0
      WATCH_INCOMING_DIR: /watch/incoming
      WATCH_PROCESSING_DIR: /watch/processing
      WATCH_TRANSLATED_DIR: /watch/translated
      WATCH_FAILED_DIR: /watch/failed
      CACHE_DIR: /watch/cache
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - translation_incoming:/watch/incoming
      - translation_processing:/watch/processing
      - translation_translated:/watch/translated
      - translation_failed:/watch/failed
      - translation_cache:/watch/cache
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  postgres_data:
  redis_data:
  translation_incoming:
  translation_processing:
  translation_translated:
  translation_failed:
  translation_cache:

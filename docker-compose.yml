services:
  postgres:
    image: postgres:17-alpine
    container_name: gengowatcher-postgres
    network_mode: host
    environment:
      POSTGRES_DB: gengowatcher
      POSTGRES_USER: gengo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gengo"]
      interval: 5s
      timeout: 5s
      retries: 5
    # P0-3 FIX: Add resource limits to prevent host DoS
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7.4-alpine
    container_name: gengowatcher-redis
    network_mode: host
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-devpass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # P0-3 FIX: Add resource limits to prevent host DoS
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  mailhog:
    image: mailhog/mailhog:latest
    network_mode: host
    # P0-3 FIX: Add resource limits to prevent host DoS
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  postgres_data:
  redis_data:

# =============================================================================
# GengoWatcher Secrets
# =============================================================================
# IMPORTANT: Do NOT commit this file with real secrets!
# Use: kubectl create secret generic gengowatcher-secrets --from-env-file=.env.production
# Or use external secrets management (AWS Secrets Manager, HashiCorp Vault, etc.)
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: gengowatcher-secrets
  namespace: gengowatcher
type: Opaque
stringData:
  # Database
  DB_HOST: "your-db-host"
  DB_PORT: "5432"
  DB_USER: "gengowatcher"
  DB_PASSWORD: "CHANGE_ME"
  DB_NAME: "gengowatcher"
  DB_SSLMODE: "require"
  
  # Redis
  REDIS_URL: "redis://:password@redis-host:6379/0"
  
  # JWT
  JWT_SECRET: "GENERATE_STRONG_SECRET_MIN_32_CHARS"
  
  # Email
  RESEND_API_KEY: "re_xxx"
  FROM_EMAIL: "noreply@gengowatcher.com"
  FROM_NAME: "GengoWatcher"
  
  # OAuth
  GOOGLE_OAUTH_CLIENT_ID: ""
  GOOGLE_OAUTH_CLIENT_SECRET: ""
  GITHUB_OAUTH_CLIENT_ID: ""
  GITHUB_OAUTH_CLIENT_SECRET: ""
  
  # Payments
  LEMONSQUEEZY_API_KEY: ""
  LEMONSQUEEZY_STORE_ID: ""
  LEMONSQUEEZY_WEBHOOK_SECRET: ""
